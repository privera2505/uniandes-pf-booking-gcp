name: Promote develop to main

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update Pull Request develop -> main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_BRANCH="develop"
          BASE_BRANCH="main"
          SHORT_SHA="${GITHUB_SHA::8}"

          BODY=$(cat <<EOF
          ## Release candidate

          Pull Request automático generado después de un push en \`develop\`.

          ### Información

          | Campo | Valor |
          |---|---|
          | Source branch | \`${HEAD_BRANCH}\` |
          | Target branch | \`${BASE_BRANCH}\` |
          | Commit | \`${SHORT_SHA}\` |
          | Fecha | $(date -u '+%Y-%m-%d %H:%M UTC') |

          ### Checklist pruebas manuales (ambiente develop)

          - [ ] Flujos principales validados
          - [ ] APIs respondiendo correctamente
          - [ ] Sin regresiones detectadas

          ### Checklist release

          - [ ] Aprobado para producción
          - [ ] Riesgos revisados
          - [ ] Listo para merge a \`main\`

          EOF
          )

          PR_NUMBER=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "Creating PR develop -> main..."
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$HEAD_BRANCH" \
              --title "release: develop to main" \
              --body "$BODY"
          else
            echo "PR #${PR_NUMBER} already exists. Updating body..."
            gh pr edit "$PR_NUMBER" --body "$BODY"
          fi